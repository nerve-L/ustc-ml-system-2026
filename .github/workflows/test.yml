name: GitHub Actions Test

# 触发条件：当代码推送到 main 或 master 分支时触发
on:
  push:
    branches: [ "main", "master" ]
  # 支持手动点击运行
  workflow_dispatch:

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
